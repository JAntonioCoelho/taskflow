name: Security

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9 AM

jobs:
  security-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run npm audit
      run: npm audit --audit-level=moderate
      continue-on-error: true

    - name: Check for hardcoded secrets
      run: |
        if grep -riE "password\s*=\s*['\"][^'\"]+['\"]|secret\s*=\s*['\"][^'\"]+['\"]|api[_-]key\s*=\s*['\"][^'\"]+['\"]" index.html; then
          echo "❌ Possible hardcoded secrets found - please review"
          exit 1
        fi
        echo "✅ No hardcoded secrets found"

    - name: Check for unsafe innerHTML usage
      run: |
        if grep -nE "innerHTML\s*=\s*[^e]" index.html | grep -v "escapeHtml\|''\|\"\""; then
          echo "⚠️ Unescaped innerHTML assignments found - please review"
        else
          echo "✅ innerHTML usage looks safe"
        fi

    - name: Validate external resources
      run: |
        EXTERNAL_URLS=$(grep -oP 'https?://[^"'\'' ]+' index.html | grep -v "localhost" || true)
        if [ -z "$EXTERNAL_URLS" ]; then
          echo "✅ No external resources found"
        else
          echo "ℹ️ External resources detected (review if expected):"
          echo "$EXTERNAL_URLS"
        fi

    - name: Create security report
      if: always()
      run: |
        {
          echo "# 🔒 Security Report"
          echo ""
          echo "## Analysis Summary"
          echo ""
          echo "- ✅ Secret check: Complete"
          echo "- ✅ innerHTML safety check: Complete"
          echo "- ✅ External resources check: Complete"
          echo "- ✅ npm audit: Complete"
          echo ""
          echo "Date: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
        } > security-report.md

    - name: Upload security report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-report
        path: security-report.md
