name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Verify application file exists
      run: |
        if [ ! -f "index.html" ]; then
          echo "❌ index.html not found"
          exit 1
        fi
        echo "✅ index.html found"

    - name: Lint
      run: npm run lint

    - name: Run tests
      run: npm test
